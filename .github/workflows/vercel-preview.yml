name: vercel-preview

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run validate:env
      - run: pnpm run lint
      - run: pnpm run test

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      backend:
        image: node:20
        ports:
          - 3001:3001
        options: >-
          --health-cmd "curl --fail http://localhost:3001/health || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run dev:local -- --hostname 0.0.0.0 &
      - run: pnpm exec wait-on http://127.0.0.1:3000
      - run: pnpm exec cypress run --config baseUrl=http://127.0.0.1:3000

  vercel-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - lint-test
      - e2e
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: vercel/action@v3
        with:
          workingDirectory: .
          command: pnpm run build
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
